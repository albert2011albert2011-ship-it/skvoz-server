name: skvoz
description: "Мессенджер 'Сквозь' - работает с интернетом и без (Bluetooth, Wi-Fi Direct, P2P)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Connectivity & P2P
  connectivity_plus: ^5.0.2
  flutter_bluetooth_serial: ^0.4.0
  wifi_direct: ^1.0.0
  network_info_plus: ^4.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.0.1
  cached_network_image: ^3.3.0
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.18.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/
